baseURL = "https://www.feoh.org/"
languageCode = "en-us"
title = "Blind Not Dumb"
summaryLength = 40

[params]
  description = "Chris Patti on software, systems, accessibility, books, and the occasional well-deserved rant."

[taxonomies]
  tag = "tags"

[permalinks]
  posts = "/posts/:slug/"

[outputs]
  home = ["HTML", "RSS"]

[outputFormats.RSS]
  mediaType = "application/rss+xml"
  baseName = "rss"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
